---
name: CI

# Continuous integration: runs on every push and pull_request to main.
# Includes a mandatory pin-check job that fails if any workflow uses a
# non-SHA action reference — enforcing the supply-chain security invariant
# that every action must be pinned to a full 40-char commit SHA.

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Pin check — every `uses:` in this repo MUST be pinned to a full 40-char
  # commit SHA; tag/branch refs are rejected. Per CLAUDE.md §2/§3 (consume the
  # central reusables, never reinvent them) this is a THIN CALLER of the org's
  # central `pin-check.yml` reusable, not an inline re-implementation. The
  # reusable is itself pinned by the central `.github` repo's commit SHA.
  # ---------------------------------------------------------------------------
  # attested-delivery/.github main @ aba1860 (resolved 2026-06-16)
  pin-check:
    permissions:
      contents: read
    uses: >-
      attested-delivery/.github/.github/workflows/pin-check.yml@aba1860be6b6ebd5c0c0a0f07160946fb0349965

  # ---------------------------------------------------------------------------
  # Lint: basic shell/YAML linting placeholder.
  # Replace or extend with your project's linter.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check for TODO/FIXME markers (informational)
        run: |
          set -euo pipefail
          count=$(grep -rn "TODO\|FIXME\|HACK\|XXX" \
            --include="*.yml" --include="*.yaml" \
            --include="*.sh" --include="*.md" \
            . 2>/dev/null | wc -l || true)
          echo "Found ${count} TODO/FIXME/HACK/XXX marker(s) (informational only)."

  # ---------------------------------------------------------------------------
  # Validate: verify workflow YAML is well-formed.
  # Requires actionlint to be installed, or skips gracefully if absent.
  # ---------------------------------------------------------------------------
  validate-workflows:
    name: Validate Workflow YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install actionlint (pinned + checksum-verified, fail-closed)
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.7"
          # Integrity floor: pinned sha256 of the release tarball (resolved from
          # the published checksums), verified BEFORE extraction so a tampered
          # download aborts the job. Replaces the unverified `curl | tar`.
          # TODO: upgrade to `gh attestation verify` / cosign when rhysd/actionlint
          # publishes Sigstore-signed provenance for its release artifacts.
          SHA256="023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
          curl -sSfL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz -C /usr/local/bin actionlint
          actionlint --version

      - name: Run actionlint
        run: actionlint .github/workflows/*.yml
